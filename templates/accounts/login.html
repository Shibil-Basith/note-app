{% extends 'base.html' %}
{% block title %}Sign In — Cloud Notes Pro{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-bg">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
  </div>
  <div class="auth-card glass">
    <div class="auth-brand">
      <div class="brand-icon large"><i class="fa-solid fa-cloud"></i></div>
      <h1>Cloud<span class="accent">Notes</span></h1>
      <p>Welcome back</p>
    </div>
    <form method="post" class="auth-form">
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label"><i class="fa-solid fa-user"></i> Username</label>
        <input type="text" name="username" class="form-input" placeholder="Your username" required autofocus>
      </div>
      <div class="form-group">
        <label class="form-label"><i class="fa-solid fa-lock"></i> Password</label>
        <div class="password-wrap">
          <input type="password" name="password" class="form-input" placeholder="Your password" required id="pwInput">
          <button type="button" class="toggle-pw" onclick="togglePw()"><i class="fa-solid fa-eye" id="eyeIcon"></i></button>
        </div>
      </div>
      {% if form.errors %}
      <div class="form-error-box"><i class="fa-solid fa-circle-xmark"></i> Invalid credentials. Please try again.</div>
      {% endif %}
      <button type="submit" class="btn btn-primary btn-full">
        <i class="fa-solid fa-arrow-right-to-bracket"></i> Sign In
      </button>
    </form>
    <div class="auth-footer">
      Don't have an account? <a href="{% url 'register' %}">Create one</a>
    </div>
  </div>
</div>
<script>
function togglePw() {
  const input = document.getElementById('pwInput');
  const icon = document.getElementById('eyeIcon');
  input.type = input.type === 'password' ? 'text' : 'password';
  icon.className = input.type === 'password' ? 'fa-solid fa-eye' : 'fa-solid fa-eye-slash';
}
</script>
{% endblock %}
