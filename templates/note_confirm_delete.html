{% extends 'base.html' %}
{% block title %}Delete Note — Cloud Notes Pro{% endblock %}
{% block extra_head %}
<style>
.del-page{display:flex;align-items:center;justify-content:center;min-height:70vh;}
.del-card{background:rgba(255,255,255,.04);border:1px solid rgba(239,68,68,.15);border-radius:28px;padding:56px 48px;text-align:center;max-width:480px;width:100%;backdrop-filter:blur(20px);animation:pageIn .5s ease both;position:relative;overflow:hidden;}
.del-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,#ef4444,#f87171,transparent);}
@keyframes pageIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.del-icon{font-size:56px;color:#f59e0b;margin-bottom:24px;display:block;animation:iconBounce 2s ease-in-out infinite;}
@keyframes iconBounce{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
.del-card h2{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;letter-spacing:-.5px;margin-bottom:12px;}
.del-card p{color:#475569;font-size:15px;line-height:1.65;margin-bottom:32px;}
.del-note-name{color:#f1f5f9;font-weight:600;}
.del-actions{display:flex;gap:12px;justify-content:center;}
</style>
{% endblock %}
{% block content %}
<div class="del-page">
  <div class="del-card">
    <span class="del-icon">⚠️</span>
    <h2>Delete this note?</h2>
    <p>You're about to permanently delete <span class="del-note-name">"{{ note.title }}"</span>. This action cannot be undone.</p>
    <div class="del-actions">
      <a href="{% url 'dashboard' %}" class="btn btn-ghost"><i class="fa-solid fa-xmark"></i> Cancel</a>
      <form method="post" style="display:inline">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger"><i class="fa-solid fa-trash"></i> Delete permanently</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
