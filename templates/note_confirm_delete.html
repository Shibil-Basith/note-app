{% extends 'base.html' %}
{% block title %}Delete Note — Cloud Notes Pro{% endblock %}
{% block content %}
<div class="form-page">
  <div class="form-card glass delete-confirm">
    <div class="delete-icon"><i class="fa-solid fa-triangle-exclamation"></i></div>
    <h2>Delete this note?</h2>
    <p>You're about to permanently delete <strong>"{{ note.title }}"</strong>. This cannot be undone.</p>
    <form method="post">
      {% csrf_token %}
      <div class="form-actions center">
        <a href="{% url 'dashboard' %}" class="btn btn-ghost">Cancel</a>
        <button type="submit" class="btn btn-danger">
          <i class="fa-solid fa-trash"></i> Yes, Delete
        </button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
