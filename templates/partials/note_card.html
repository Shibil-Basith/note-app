{% load tz %}
<div class="note-card cat-{{ note.category }}" data-id="{{ note.pk }}">
  <div class="note-card-header">
    <span class="note-category-badge">{{ note.get_category_display }}</span>
    {% if note.is_pinned %}<span class="pin-badge"><i class="fa-solid fa-thumbtack"></i></span>{% endif %}
  </div>
  <h3 class="note-title"><a href="{% url 'view_note' note.pk %}">{{ note.title }}</a></h3>
  <p class="note-excerpt">{{ note.short_content }}</p>
  <div class="note-footer">
    <span class="note-date"><i class="fa-regular fa-clock"></i> {{ note.updated_at|date:"M d, Y" }}</span>
    <div class="note-actions">
      <a href="{% url 'edit_note' note.pk %}" class="icon-btn" title="Edit"><i class="fa-solid fa-pen"></i></a>
      <a href="{% url 'delete_note' note.pk %}" class="icon-btn danger" title="Delete"><i class="fa-solid fa-trash"></i></a>
    </div>
  </div>
</div>
